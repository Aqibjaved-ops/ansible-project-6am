---
- name: Using the copy module
  hosts: servera
  tasks:
    - name: Copy a file to managed host
      ansible.builtin.copy:
        src: files/users.txt
        dest: /home/student/users.txt
        owner: student 
        group: student
        mode: u+rw,g-wx,o-rwx
        setype: samba_share_t