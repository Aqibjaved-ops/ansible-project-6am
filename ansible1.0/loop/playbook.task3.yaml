---
- name: MariaDB server is running
  hosts: serverb
  vars:
    mariadb_packages:
      - mariadb-server
      - python3-PyMySQL
  tasks:
    - name: MariaDB packages are installed
      ansible.builtin.dnf:
        name: "{{ item }}"    
        state: present
      loop: "{{ mariadb_packages }}"
      when: ansible_facts['distribution'] == "Fedora" or ansible_facts['distribution_major_version'] == "10"
      
    - name: Start MariaDB service
      ansible.builtin.service:
        name: mariadb
        state: started
        enabled: true