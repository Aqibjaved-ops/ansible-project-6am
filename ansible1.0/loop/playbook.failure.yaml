---
- name: Task Failure
  hosts: servera
  vars:
    web_package: httpd
    db_package: mariadb-server
    db_service: mariadb

  tasks: 
    - name: Setup a webserver
      block:
        - name: Install httpd package
          ansible.builtin.dnf:
            name: "{{ web_package }}"
            state: present

      rescue:
        - name: Install mariadb package
          ansible.builtin.dnf:
            name: "{{ db_package }}"
            state: present


      always:
        - name: Start db service
          ansible.builtin.service:
            name: "{{ db_service }}"
            state: started
            enabled: true

