---
  - name: Install the firewall
    ansible.builtin.dnf:
      name: "{{ firewall_pkg }}"
      state: latest
  
  - name: Start the firewall
    ansible.builtin.service:
      name: "{{ firewall_svc }}"
      enabled: true
      state: started
 
  - name: Allow http in firewalld
    ansible.posix.firewalld:
      service: "{{ rule }}"
      permanent: true
      immediate: true
      state: enabled
